forward_command_controller:
  joints: {
    type: string_array,
    description: "Name of the joints to control",
    validation: {
      not_empty<>: []
    },
    read_only: true
  }
  interface_name: {
    type: string,
    description: "Name of the interface of the joint",
    validation: {
      not_empty<>: []
    },
    read_only: true
  }
  queue_size: {
    type: int,
    description: "Size of the command queue",
    default_value: 1,
    read_only: true,
    validation: {
      gt_eq<>: 1
    },
  }
